# ============================================================
#  AgentRouteAI — Docker Compose
#  Services: mysql | backend (Flask+Worker) | frontend (Nginx)
# ============================================================

services:

  # ── MySQL Database ────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: agentroute_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: shipment_risk_db
      MYSQL_USER: agentroute
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-AgentRoute@2026!}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - agentroute_net

  # ── Backend + Agentic Worker (Flask / Gunicorn) ───────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentroute_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override DB host to use Docker service name
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: agentroute
      MYSQL_DATABASE: shipment_risk_db
      FLASK_ENV: production
      PYTHONUNBUFFERED: "1"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - agentroute_net

  # ── Frontend (Nginx — static files + reverse proxy) ───────
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: agentroute_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - agentroute_net

# ── Volumes ──────────────────────────────────────────────────
volumes:
  mysql_data:
    name: agentroute_mysql_data

# ── Networks ─────────────────────────────────────────────────
networks:
  agentroute_net:
    name: agentroute_network
    driver: bridge
